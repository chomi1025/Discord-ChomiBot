name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Run check
        run: node bot.js
        env:
          NODE_ENV: test
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}

  deploy:
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}

          script: |
            cd /home/chome49100/Discord-ChomiBot
            git pull origin main
            yarn install
            pm2 reload bot
